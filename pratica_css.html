<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>Aula CSS - 1</title>
</head>
<body>

	<div class="container">

		<div style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 60px;">
			<img style="width: 100%;  height: 100%; margin-top: 20px;" src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="">
		</div>

		<div>
			<h1 style="font-family: monospace; font-size: 30px;">
				Meu nome é: <span class="segundotexto">Adriana</span>
			</h1>
					<!-- TAG SPAN: coringa -->
			<p style="font-family: monospace; font-size: 15px;">
				Mensagem: <span class="segundotexto">A vida não é um morango!</span> E está tudo bem!
			</p>
		</div>
	</div>

	<div class="container">

		<div style="width: 100px; height: 100px; border-radius: 25px; margin-bottom: 60px;">
			<img style="width: 100%;  height: 100%; margin-top: 20px;" src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="">
		</div>

		<div>
			<h1 style="font-family: monospace; font-size: 30px;">
				Meu nome é: <span class="segundotexto">Hugo</span>
			</h1>

			<p style="font-family: monospace; font-size: 15px;">
				Mensagem: Um dia é da caça, o outro é do caçador.
			</p>
		</div>
	</div>

</body>

</html>
